name: Print output

on: [push, pull_request]

jobs:
  test:
    name: Print output from ${{ matrix.framework }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        framework: [net10.0]
        include:
        - os: windows-latest
          rid: win-x64
          name: NorthwoodLib.Tester.exe
        - os: ubuntu-latest
          rid: linux-x64
          name: NorthwoodLib.Tester
        - os: macos-latest
          rid: osx-x64
          name: NorthwoodLib.Tester
        - os: macos-latest
          rid: osx-arm64
          name: NorthwoodLib.Tester
          
    steps:
    - uses: actions/checkout@v7.0.0

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5.4.0
      with:
        dotnet-version: 10.0

    - name: Restore
      run: dotnet restore

    - name: Publish
      run: dotnet publish -c Release -r ${{ matrix.rid }} NorthwoodLib.Tester

    - name: Run
      run: NorthwoodLib.Tester/bin/Release/${{ matrix.framework }}/${{ matrix.rid }}/publish/${{ matrix.name }}
